<!DOCTYPE html>
<html>
<head>
    <title>Курси валют</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f7f6;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }

        nav {
            margin-bottom: 30px;
        }

        nav a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
            margin-right: 15px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        nav a:hover {
            background-color: #d6eaf8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #2c3e50;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }

        .empty-msg {
            text-align: center;
            color: #95a5a6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <nav>
        <a href="/all/">Всі курси</a> | 
        <a href="/today/">Сьогодні</a>
    </nav>
    <hr>
    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>Назва</th>
                <th>Купівля</th>
                <th>Продаж</th>
            </tr>
        </thead>
        <tbody>
            {% for r in rates %}
            <tr>
                <td>{{ r.name }}</td>
                <td>{{ r.buy_rate }}</td>
                <td>{{ r.sell_rate }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">Записів немає</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>

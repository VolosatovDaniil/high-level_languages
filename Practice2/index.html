<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Завдання 1</title>
</head>
<body>
    <div id="container"></div>

<script>
  fetch('data.json')
    .then(response => response.json())
    .then(data => {
      const myImg = document.createElement('img');
      myImg.src = data.url;
      
      document.getElementById('container').appendChild(myImg);
    });
</script>
</body>
</html>
